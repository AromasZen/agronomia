<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Gestión</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--clr-bg-light);
            overflow: hidden;
            margin: 0;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px;
        }

        .portal-container {
            text-align: center;
            max-width: 800px;
            width: 100%;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        .portal-title {
            color: var(--clr-text-main);
            font-size: 2.5rem;
            margin-bottom: 3rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .portal-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .portal-card {
            background: var(--clr-surface);
            border: 1px solid var(--clr-admin-border);
            border-radius: var(--radius-lg);
            padding: 3rem 2rem;
            text-decoration: none;
            color: var(--clr-text-main);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }

        .portal-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1) 0%, rgba(34, 197, 94, 0) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .portal-card:hover {
            transform: translateY(-5px);
            border-color: var(--clr-primary-500);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .portal-card:hover::before {
            opacity: 1;
        }

        .portal-card i {
            font-size: 4rem;
            color: var(--clr-primary-500);
            margin-bottom: 1.5rem;
            transition: transform 0.3s ease;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .portal-card:hover i {
            transform: scale(1.1);
        }

        .portal-card h2 {
            font-size: 1.5rem;
            margin: 0;
            font-weight: 600;
        }

        .portal-card p {
            color: var(--clr-text-muted);
            margin-top: 1rem;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <div class="portal-container">
        <h1 class="portal-title">Seleccione el Módulo</h1>
        
        <div class="portal-cards">
            <a href="agroquimicos.html" class="portal-card">
                <h2>Agroquímicos</h2>
                <p>Gestión de stock e inventario de agroquímicos y fertilizantes.</p>
            </a>
            
            <a href="rollos.html" class="portal-card">
                <h2>Rollos</h2>
                <p>Gestión de inventario de rollos, mangueras y accesorios.</p>
            </a>
        </div>
    </div>
</body>

</html>
